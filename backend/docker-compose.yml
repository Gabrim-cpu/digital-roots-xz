version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: xz_postgres
    environment:
      POSTGRES_DB: xz_database
      POSTGRES_USER: xz_user
      POSTGRES_PASSWORD: xz_password_123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:latest
    container_name: xz_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  pgadmin:
    image: dpage/pgadmin4
    container_name: xz_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@xz.com
      PGADMIN_DEFAULT_PASSWORD: admin_password_123
    ports:
      - "5050:80"
    depends_on:
      - postgres

  mongo-express:
    image: mongo-express:latest
    container_name: xz_mongo_express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: mexpress123
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: xz_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  mongo_data:
  redis_data:
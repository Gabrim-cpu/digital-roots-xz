version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: xz_postgres
    environment:
      POSTGRES_DB: xz_database
      POSTGRES_USER: xz_user
      POSTGRES_PASSWORD: xz_password_123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:latest
    container_name: xz_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  pgadmin:
    image: dpage/pgadmin4
    container_name: xz_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@xz.com
      PGADMIN_DEFAULT_PASSWORD: admin_password_123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  mongo_data: